<html>

<head>
  <title>鮮奶價格追蹤中</title>
  <link rel="stylesheet" href="/stylesheets/style.css">
</head>

<body>

  <div>
    <h2 class="page-title" style="font-size: 35px;">想知道往年的鮮奶價格嗎？</h2>
  </div>

  <!-- 上方：搜尋推估表單 與 結果容器 -->
  <section style="margin-top:12px;">
    <h2 style="font-weight: normal;">鮮奶價格推估搜尋</h2>
    <form id="searchForm" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <div>
        <label for="s_year">查詢年份 (year)</label>
        <input type="number" id="s_year" name="s_year" min="1900" required>
      </div>
      <div>
        <label for="s_month">查詢月份 (month, 可不填)</label>
        <input type="number" id="s_month" name="s_month" min="0" max="12" placeholder="0">
      </div>
      <div>
        <button type="submit">查詢推估價格</button>
      </div>
    </form>

    <div id="searchResult" style="margin-top:12px"></div>
  </section>

  <!-- 下方雙欄：左表格、右新增表單 -->
  <section style="margin-top:24px; display:flex; gap:24px; align-items:flex-start;">
    <!-- 左側：所有資料表格 -->
    <div style="flex:1; min-width:320px;">
      <h3 style="margin-top:0; font-weight: normal; font-size:18px;">歷年鮮奶指數資料</h3>
      <div id="cpiTableWrap">
        <table id="cpiTable" border="1" cellpadding="4" cellspacing="0" style="width:100%; border-collapse:collapse;">
          <thead>
            <tr><th>year</th><th>month</th><th>cpi</th></tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
      <div id="tableMsg" style="margin-top:8px;color:#666"></div>
    </div>

    <!-- 右側：新增表單（原新增區塊移至此處） -->
    <div style="width:360px;">
      <h3 style="margin-top:0; font-weight: normal; font-size:18px;">新增鮮奶指數</h3>
      <form id="cpiForm">
        <label for="year">年 (year)</label>
        <input type="number" id="year" name="year" min="1900" required style="width:100%;">

        <label for="month">月 (month, 0 表示全年)</label>
        <input type="number" id="month" name="month" min="0" max="12" value="0" style="width:100%;">

        <label for="price">價格 (price，請輸入商品價格)</label>
        <input type="number" step="0.01" id="price" name="price" required style="width:100%;">

        <div style="margin-top:8px;">
          <button type="submit">送出</button>
        </div>
      </form>
      <div id="result" aria-live="polite" style="margin-top:12px"></div>
    </div>
  </section>
  <script>
    // --- 搜尋表單（上方） ---
    const searchForm = document.getElementById('searchForm');
    const searchResult = document.getElementById('searchResult');
    searchForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      searchResult.innerHTML = '';
      const yearInput = document.getElementById('s_year').value;
      if (!yearInput) {
        searchResult.textContent = '請輸入查詢年份';
        searchResult.style.color = 'red';
        return;
      }
      const year = parseInt(yearInput, 10);
      if (Number.isNaN(year)) {
        searchResult.textContent = '年份格式錯誤';
        searchResult.style.color = 'red';
        return;
      }
      let month = 0;
      const monthInput = document.getElementById('s_month').value;
      if (monthInput !== '') {
        month = parseInt(monthInput, 10);
        if (Number.isNaN(month)) {
          searchResult.textContent = '月份格式錯誤';
          searchResult.style.color = 'red';
          return;
        }
      }

      try {
        const res = await fetch(`/api/cpi/search?year=${year}&month=${month}`);
        if (!res.ok) {
          searchResult.textContent = `查詢失敗: ${res.status}`;
          searchResult.style.color = 'red';
          return;
        }
        const json = await res.json();
        const rows = Array.isArray(json.data) ? json.data : [];
        if (rows.length === 0) {
          searchResult.innerHTML = '<p>查無此年月的通膨資料</p>';
          return;
        }
        // 建表顯示結果（年份、月份、CPI 指數、推估價格）
        const tbl = document.createElement('table');
        tbl.border = 1; tbl.cellPadding = 6; tbl.style.borderCollapse = 'collapse';
        const thead = document.createElement('thead');
        thead.innerHTML = '<tr><th>年份</th><th>月份</th><th>CPI 指數</th><th>推估價格(元)</th></tr>';
        tbl.appendChild(thead);
        const tb = document.createElement('tbody');
        for (const r of rows) {
          const tr = document.createElement('tr');
          const estPrice = Math.round(166 * (Number(r.cpi) / 100));
          tr.innerHTML = `<td>${r.year}</td><td>${r.month}</td><td>${r.cpi}</td><td>${estPrice}</td>`;
          tb.appendChild(tr);
        }
        tbl.appendChild(tb);
        searchResult.appendChild(tbl);
      } catch (err) {
        searchResult.textContent = 'Network error: ' + err.message;
        searchResult.style.color = 'red';
      }
    });

    // --- 新增表單（右側） ---
    const form = document.getElementById('cpiForm');
    const resultEl = document.getElementById('result');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resultEl.textContent = '';
      resultEl.style.color = '';

      const year = parseInt(document.getElementById('year').value, 10);
      const month = parseInt(document.getElementById('month').value, 10) || 0;
      const price = parseFloat(document.getElementById('price').value);
      if (Number.isNaN(price)) {
        resultEl.textContent = 'Invalid price';
        resultEl.style.color = 'red';
        return;
      }
      // 轉換公式：目標月CPI = 目標月推估價格 ÷ 110年實際價格(166) * 100
      const cpi = +(price / 166 * 100).toFixed(2);

      try {
        const res = await fetch('/api/insert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ year, month, cpi })
        });
        // API 回傳為純文字（text）
        const text = await res.text();
        if (!res.ok) {
          resultEl.textContent = `錯誤: ${text}`;
          resultEl.style.color = 'red';
        } else {
          resultEl.textContent = text; // 顯示伺服器回傳的純文字訊息
          resultEl.style.color = 'green';
          // 成功後重新載入 table
          await loadCpiTable();
        }
      } catch (err) {
        resultEl.textContent = 'Network error: ' + err.message;
        resultEl.style.color = 'red';
      }
    });

    // 載入 /api/cpi 並在 table 中顯示資料
    async function loadCpiTable() {
      const msgEl = document.getElementById('tableMsg');
      msgEl.textContent = '載入中...';
      try {
        const res = await fetch('/api/cpi');
        if (!res.ok) {
          msgEl.textContent = '無法取得資料: ' + res.status;
          return;
        }
        const json = await res.json();
        const rows = Array.isArray(json.data) ? json.data : [];
        const tbody = document.querySelector('#cpiTable tbody');
        tbody.innerHTML = '';
        if (rows.length === 0) {
          msgEl.textContent = '目前沒有資料';
          return;
        }
        msgEl.textContent = `共 ${rows.length} 筆`;
        for (const r of rows) {
          const tr = document.createElement('tr');
          const y = document.createElement('td'); y.textContent = r.year;
          const m = document.createElement('td'); m.textContent = r.month;
          const c = document.createElement('td'); c.textContent = r.cpi;
          tr.appendChild(y); tr.appendChild(m); tr.appendChild(c);
          tbody.appendChild(tr);
        }
      } catch (err) {
        document.getElementById('tableMsg').textContent = 'Network error: ' + err.message;
      }
    }

    // initial load
    loadCpiTable();
  </script>
</body>

</html>
